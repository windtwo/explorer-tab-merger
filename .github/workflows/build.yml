name: build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

# Default GITHUB_TOKEN is read-only for `contents`. Tag pushes need write to create a Release.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true

      - name: cargo test (unit + integration)
        run: cargo test --all

      - name: cargo build --release
        run: cargo build --release

      - name: Show artifact size
        shell: pwsh
        run: |
          $exe = "target/release/explorer_tab_merger.exe"
          $size = (Get-Item $exe).Length
          Write-Host "Built $exe — $([math]::Round($size/1KB,1)) KB"

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: explorer_tab_merger-windows-x64
          path: target/release/explorer_tab_merger.exe
          if-no-files-found: error

      - name: Create GitHub Release on tag push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/explorer_tab_merger.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
